<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpecWatch Dashboard{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-radar"></i> SpecWatch
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path.startswith('/vendors') %}active{% endif %}" href="/vendors">
                            <i class="bi bi-building"></i> Vendors
                        </a>
                    </li>
                </ul>
                
                <!-- Pipeline controls -->
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-primary" onclick="runPipeline('discovery')">
                        <i class="bi bi-search"></i> Discovery
                    </button>
                    <button class="btn btn-sm btn-outline-success" onclick="runPipeline('analysis')">
                        <i class="bi bi-gear"></i> Analysis
                    </button>
                    <button class="btn btn-sm btn-outline-warning" onclick="runPipeline('alerting')">
                        <i class="bi bi-bell"></i> Alerting
                    </button>
                    <button class="btn btn-sm btn-primary" onclick="runPipeline('full')">
                        <i class="bi bi-play-fill"></i> Full Pipeline
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid py-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Pipeline Progress Modal -->
    <div class="modal fade" id="pipelineModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Pipeline Running</h5>
                </div>
                <div class="modal-body">
                    <p id="pipelineStage">Starting...</p>
                    <div class="progress">
                        <div id="pipelineProgress" class="progress-bar progress-bar-striped progress-bar-animated" 
                             role="progressbar" style="width: 0%">0%</div>
                    </div>
                    <p id="pipelineMessage" class="mt-3 text-muted small"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
