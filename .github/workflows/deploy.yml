name: Deploy SpecWatch to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Basic Python syntax validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        run: |
          python -m py_compile run_dashboard.py
          python -m py_compile main.py

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/specwatch-platform
            git pull origin main
            source specwatchenv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart specwatch
            sudo systemctl status specwatch --no-pager